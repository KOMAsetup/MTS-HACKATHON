services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      OLLAMA_NUM_GPU: "999"
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b}
    gpus: all
    volumes:
      - ollama:/root/.ollama
      - ./docker/entrypoint-ollama.sh:/entrypoint-ollama.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint-ollama.sh"]

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:7b}
      OLLAMA_NUM_GPU: "999"
      NUM_CTX: "4096"
      NUM_PREDICT: "256"
    depends_on:
      - ollama

volumes:
  ollama:
